services:
  postgres:
    image: postgres:16-alpine
    container_name: nova-postgres
    environment:
      POSTGRES_USER: nova
      POSTGRES_PASSWORD: nova
      POSTGRES_DB: nova
    ports:
      - "127.0.0.1:${NOVA_PG_PORT:-5432}:5432"
    volumes:
      - nova_pg_data:/var/lib/postgresql/data
      - ./scripts/init-db.sql:/docker-entrypoint-initdb.d/init-db.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U nova -d nova"]
      interval: 5s
      timeout: 5s
      retries: 10

  rootfs-builder:
    build:
      context: .
      dockerfile: Dockerfile.rootfs
    container_name: nova-rootfs-builder
    # privileged is required for loopback mount operations during rootfs build.
    # In production, consider building rootfs images offline instead.
    privileged: true
    restart: "no"
    volumes:
      - nova_rootfs:/opt/nova/rootfs

  nova:
    build:
      context: .
      dockerfile: Dockerfile
      target: nova-runtime
    container_name: nova-controlplane
    command: ["nova", "daemon", "--config", "configs/nova.json", "--http", ":9001"]
    environment:
      NOVA_PG_DSN: postgres://nova:nova@postgres:5432/nova?sslmode=disable
      NOVA_LOG_LEVEL: info
      NOVA_ROOTFS_DIR: /opt/nova/rootfs
      NOVA_CODE_DIR: /tmp/nova/code
      NOVA_DOCKER_IMAGE_PREFIX: nova-runtime
      NOVA_DOCKER_NETWORK: nova_default
      NOVA_MASTER_KEY: "1710f674b5e29cd55bba9c1481625ac255886d763ed7dd6aeab8b21382910d1e"
      NOVA_AUTH_JWT_SECRET: "nova-dev-jwt-secret"
      NOVA_RUN_DIR: /var/lib/nova/run
    depends_on:
      postgres:
        condition: service_healthy
      rootfs-builder:
        condition: service_completed_successfully
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - nova_rootfs:/opt/nova/rootfs
      - nova_code:/tmp/nova/code
      - nova_run:/var/lib/nova/run
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:9001/health"]
      interval: 5s
      timeout: 5s
      retries: 10

  comet:
    build:
      context: .
      dockerfile: Dockerfile
      target: comet-runtime
    container_name: comet-dataplane
    command: ["comet", "daemon", "--config", "configs/nova.json", "--grpc", ":9090"]
    environment:
      NOVA_PG_DSN: postgres://nova:nova@postgres:5432/nova?sslmode=disable
      NOVA_LOG_LEVEL: info
      NOVA_ROOTFS_DIR: /opt/nova/rootfs
      NOVA_CODE_DIR: /tmp/nova/code
      NOVA_DOCKER_IMAGE_PREFIX: nova-runtime
      NOVA_DOCKER_NETWORK: nova_default
      NOVA_MASTER_KEY: "1710f674b5e29cd55bba9c1481625ac255886d763ed7dd6aeab8b21382910d1e"
      NOVA_RUN_DIR: /var/lib/nova/run
    depends_on:
      postgres:
        condition: service_healthy
      rootfs-builder:
        condition: service_completed_successfully
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - nova_rootfs:/opt/nova/rootfs
      - nova_code:/tmp/nova/code
      - nova_run:/var/lib/nova/run
    healthcheck:
      test: ["CMD-SHELL", "nc -z localhost 9090"]
      interval: 5s
      timeout: 5s
      retries: 10

  zenith:
    build:
      context: .
      dockerfile: Dockerfile
      target: zenith-runtime
    container_name: zenith-gateway
    command:
      - "zenith"
      - "serve"
      - "--listen"
      - ":9000"
      - "--nova-url"
      - "http://nova:9001"
      - "--comet-grpc"
      - "comet:9090"
      - "--corona-url"
      - "http://corona:9003"
      - "--nebula-url"
      - "http://nebula:9004"
      - "--aurora-url"
      - "http://aurora:9002"
    environment:
      NOVA_LOG_LEVEL: info
    ports:
      - "9000:9000"
    depends_on:
      nova:
        condition: service_healthy
      comet:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:9000/health"]
      interval: 5s
      timeout: 5s
      retries: 10

  corona:
    build:
      context: .
      dockerfile: Dockerfile
      target: corona-runtime
    container_name: corona-scheduler
    command: ["corona", "daemon", "--config", "configs/nova.json", "--comet-grpc", "comet:9090", "--listen", ":9003"]
    environment:
      NOVA_PG_DSN: postgres://nova:nova@postgres:5432/nova?sslmode=disable
      NOVA_LOG_LEVEL: info
    depends_on:
      postgres:
        condition: service_healthy
      comet:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:9003/health"]
      interval: 5s
      timeout: 5s
      retries: 10

  nebula:
    build:
      context: .
      dockerfile: Dockerfile
      target: nebula-runtime
    container_name: nebula-eventbus
    command: ["nebula", "daemon", "--config", "configs/nova.json", "--comet-grpc", "comet:9090", "--listen", ":9004"]
    environment:
      NOVA_PG_DSN: postgres://nova:nova@postgres:5432/nova?sslmode=disable
      NOVA_LOG_LEVEL: info
      NOVA_MASTER_KEY: "1710f674b5e29cd55bba9c1481625ac255886d763ed7dd6aeab8b21382910d1e"
    depends_on:
      postgres:
        condition: service_healthy
      comet:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:9004/health"]
      interval: 5s
      timeout: 5s
      retries: 10

  aurora:
    build:
      context: .
      dockerfile: Dockerfile
      target: aurora-runtime
    container_name: aurora-observability
    command: ["aurora", "daemon", "--config", "configs/nova.json", "--listen", ":9002"]
    environment:
      NOVA_PG_DSN: postgres://nova:nova@postgres:5432/nova?sslmode=disable
      NOVA_LOG_LEVEL: info
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:9002/health"]
      interval: 5s
      timeout: 5s
      retries: 10

  lumen:
    build:
      context: ./lumen
      dockerfile: Dockerfile
    container_name: lumen
    environment:
      HOSTNAME: "0.0.0.0"
      BACKEND_URL: http://zenith:9000
    ports:
      - "3000:3000"
    depends_on:
      zenith:
        condition: service_healthy

  seeder:
    image: curlimages/curl:latest
    container_name: nova-seeder
    depends_on:
      zenith:
        condition: service_healthy
    restart: "no"
    volumes:
      - ./scripts:/scripts:ro
    environment:
      SKIP_WORKFLOWS: "1"
    entrypoint: ["/bin/sh", "/scripts/seed-functions.sh", "http://zenith:9000"]

  workflow-seeder:
    image: curlimages/curl:latest
    container_name: nova-workflow-seeder
    depends_on:
      seeder:
        condition: service_completed_successfully
    restart: "no"
    volumes:
      - ./scripts:/scripts:ro
    entrypoint: ["/bin/sh", "/scripts/seed-workflows.sh", "http://zenith:9000"]

volumes:
  nova_pg_data:
  nova_rootfs:
  nova_run:
  nova_code:
